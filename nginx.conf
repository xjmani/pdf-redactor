server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Map .mjs to text/javascript so the browser accepts the vendored
    # pdfjs-dist + pdf-lib ESM modules. nginx's default mime.types still
    # serves .mjs as application/octet-stream which browsers reject for
    # `import` statements.
    types {
        text/javascript            js mjs;
        text/css                   css;
        text/html                  html;
        image/svg+xml              svg;
        image/png                  png;
        image/x-icon               ico;
        application/json           json webmanifest;
        application/wasm           wasm;
        font/woff2                 woff2;
        font/woff                  woff;
    }
    default_type application/octet-stream;

    # gzip text assets so the html ships small. The vendored .mjs files are
    # ~330 KB / ~512 KB / ~1.4 MB uncompressed; gzip gets them down ~70%.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json image/svg+xml;

    # All add_header directives at server scope. nginx replaces the inherited
    # set whenever a location adds even one header, so they stay centralized.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # 'unsafe-eval' is required because pdfjs-dist and pdf-lib both use
    # Function() at runtime for font / Type1 parsing. Without it the page
    # silently fails on first PDF load. Everything else stays locked to 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; worker-src 'self' blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header Cache-Control "no-cache, must-revalidate" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
    location = /robots.txt {
        log_not_found off;
        access_log off;
        return 200 "User-agent: *\nAllow: /\n";
    }
}
